name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: '22'

jobs:
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm run test:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-report
          path: reports/frontend-tests.xml

  sidecar-tests:
    name: Sidecar tests
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - run: npm ci --prefix sidecar
      - run: npm --prefix sidecar run test:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sidecar-test-report
          path: reports/sidecar-tests.xml

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  coverage-thresholds:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm ci --prefix sidecar
      - run: npm run test:coverage
      - run: npm --prefix sidecar run test:coverage

  quality-analysis:
    name: Quality analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm ci --prefix sidecar
      - run: npm run quality:file-size
      - run: npm run quality:tech-debt
      - run: npm run quality:boundaries
      - run: npm run quality:deps
      - run: npm run quality:deadcode
      - run: npm run quality:duplicates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duplicate-code-report
          path: reports/jscpd/

  flaky-test-check:
    name: Flaky test check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm ci --prefix sidecar
      - run: npm run test:flaky
      - run: npm --prefix sidecar run test:flaky
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flaky-test-rerun-state
          path: reports/*-reruns.json

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck

  sidecar-typecheck:
    name: Sidecar typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - run: npm ci --prefix sidecar
      - run: npm run sidecar:typecheck

  electron-syntax:
    name: Electron syntax
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run electron:check

  production-build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm ci --prefix sidecar
      - run: mkdir -p reports
      - run: /usr/bin/time -f "production-build elapsed=%E max_rss_kb=%M" -o reports/build-timing.txt npm run build
      - run: cat reports/build-timing.txt >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-timing
          path: reports/build-timing.txt

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run format:check

  docs-check:
    name: Documentation check
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run docs:check

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm ci --prefix sidecar
      - name: Run lint diagnostics
        run: |
          set +e
          npm run lint 2>&1 | tee reports-lint.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### Lint diagnostics"
              echo ""
              echo "\`npm run lint\` exited with status $status. This job is informational while the lint backlog is burned down."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-diagnostics
          path: reports-lint.txt

  strict-typecheck:
    name: Strict typecheck (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
      - run: npm ci
      - run: npm ci --prefix sidecar
      - name: Run strict typecheck diagnostics
        run: |
          set +e
          npm run typecheck:strict 2>&1 | tee reports-strict-frontend.txt
          frontend_status=${PIPESTATUS[0]}
          npm run sidecar:typecheck:strict 2>&1 | tee reports-strict-sidecar.txt
          sidecar_status=${PIPESTATUS[0]}
          if [ "$frontend_status" -ne 0 ] || [ "$sidecar_status" -ne 0 ]; then
            {
              echo "### Strict typecheck diagnostics"
              echo ""
              echo "\`npm run typecheck:strict\` exited with status $frontend_status."
              echo "\`npm run sidecar:typecheck:strict\` exited with status $sidecar_status."
              echo ""
              echo "This job is informational while the strict-type backlog is burned down."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: strict-typecheck-diagnostics
          path: |
            reports-strict-frontend.txt
            reports-strict-sidecar.txt
